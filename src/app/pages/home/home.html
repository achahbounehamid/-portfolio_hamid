<h2>🚀 My Projects</h2>

@if (projects$ | async; as projects) {

  <div class="grid">

    @for (project of projects; track project.title) {

      <div class="card">

        <h3>{{ project.title }}</h3>

        <p>{{ project.description }}</p>

        <div class="tags">
          @for (tag of project.tags; track $index) {
            <span class="tag">{{ tag }}</span>
          }
        </div>

      </div>

    }

  </div>

}
